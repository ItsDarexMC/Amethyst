<script>
/* PARTÍCULAS (líneas naranjas) */
(function() {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        init();
    }

    function init() {
        particles = [];
        const count = Math.floor((w*h)/7500);

        for (let i=0;i<count;i++) {
            particles.push({
                x: Math.random()*w,
                y: Math.random()*h,
                vx:(Math.random()-0.5)*0.2,
                vy:(Math.random()-0.5)*0.2
            });
        }
    }

    function draw() {
        ctx.clearRect(0,0,w,h);

        for (let i=0;i<particles.length;i++) {
            let p1=particles[i];
            p1.x+=p1.vx; p1.y+=p1.vy;

            if(p1.x<0||p1.x>w)p1.vx*=-1;
            if(p1.y<0||p1.y>h)p1.vy*=-1;

            ctx.beginPath();
            ctx.arc(p1.x,p1.y,2,0,Math.PI*2);
            ctx.fillStyle="#ff7300";
            ctx.fill();

            for(let j=i+1;j<particles.length;j++){
                let p2=particles[j];
                let dx=p1.x-p2.x;
                let dy=p1.y-p2.y;
                let dist=Math.sqrt(dx*dx+dy*dy);

                if(dist<150){
                    ctx.beginPath();
                    ctx.moveTo(p1.x,p1.y);
                    ctx.lineTo(p2.x,p2.y);
                    ctx.strokeStyle="#ff7300";
                    ctx.globalAlpha=1-(dist/150);
                    ctx.stroke();
                    ctx.globalAlpha=1;
                }
            }
        }
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
})();

/* DISCORD STATS */
(async function(){
    const code="BMWbAHC28p";

    async function update(){
        try{
            const r=await fetch(`https://discord.com/api/v9/invites/${code}?with_counts=true`);
            const d=await r.json();

            document.getElementById('discord-online').textContent=d.approximate_presence_count||0;
            document.getElementById('discord-total').textContent=d.approximate_member_count||0;
        }catch{}
    }

    update();
    setInterval(update,60000);
})();
